name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Build + test + pack on every push to main and every PR. Tag pushes are
# handled by .github/workflows/release.yml — that workflow runs the same
# build/test plus publishes to nuget.org.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./artifacts -p:PackageOutputPath=${{ github.workspace }}/artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg

  test:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test --configuration Release --verbosity normal
